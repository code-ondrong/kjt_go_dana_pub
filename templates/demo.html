<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DANA QRIS Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', 'Segoe UI', sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; padding: 2rem; }
  .container { max-width: 1000px; margin: 0 auto; }
  h1 { color: #38bdf8; margin-bottom: 0.5rem; font-weight: 800; letter-spacing: -0.025em; }
  .badge { background: #0ea5e9; color: white; padding: 4px 12px; border-radius: 9999px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 2rem; margin-top: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); }
  h2 { color: #e2e8f0; margin-bottom: 1.5rem; font-size: 1.25rem; font-weight: 600; border-bottom: 1px solid #334155; padding-bottom: 0.75rem; }
  .field { margin-bottom: 1.25rem; }
  label { display: block; font-size: 0.875rem; color: #94a3b8; margin-bottom: 6px; font-weight: 500; }
  input { width: 100%; padding: 12px 16px; border: 1px solid #334155; border-radius: 12px; font-size: 1rem; background: #0f172a; color: white; transition: all 0.2s; }
  input:focus { outline: none; border-color: #38bdf8; ring: 2px #38bdf8; }
  .btn { display: inline-flex; align-items: center; justify-content: center; background: #0ea5e9; color: white; border: none; padding: 12px 24px; border-radius: 12px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: all 0.2s; }
  .btn:hover { background: #0284c7; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-green { background: #10b981; }
  .btn-green:hover { background: #059669; }
  .qr-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 256px;}
  .qr-img { background: white; padding: 16px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); max-width: 256px; }
  .status { padding: 12px 16px; border-radius: 12px; margin-top: 1rem; font-size: 0.95rem; font-weight: 500; }
  .status.success { background: #064e3b; color: #34d399; border: 1px solid #065f46; }
  .status.error { background: #7f1d1d; color: #f87171; border: 1px solid #991b1b; }
  .status.info { background: #1e3a8a; color: #93c5fd; border: 1px solid #1e40af; }
  #events { height: 250px; overflow-y: auto; border: 1px solid #334155; border-radius: 12px; padding: 1rem; font-size: 0.875rem; font-family: 'Fira Code', monospace; background: #0f172a; color: #38bdf8; }
  .grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 2rem; }
  @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
  .log-entry { border-left: 2px solid #334155; padding-left: 12px; margin-bottom: 8px; }
  .log-time { color: #64748b; margin-right: 8px; font-size: 0.75rem; }
</style>
</head>
<body>
<div class="container">
  <h1>🔷 DANA QRIS GATEWAY <span class="badge">Sandbox</span></h1>
  <p style="color:#94a3b8; margin-top:6px">Integrasi QRIS Pembayaran DANA Real-time</p>
  
  <div class="grid">
    <div class="card">
      <h2>🆕 Buat QR Pembayaran</h2>
      <div class="field"><label>Partner Reference No</label><input id="refNo" value="INV-2024001" /></div>
      <div class="field"><label>Jumlah (IDR)</label><input id="amount" type="number" value="1000" /></div>
      <div class="field"><label>Keterangan</label><input id="desc" value="Pembayaran Toko XYZ" /></div>
      <button class="btn" onclick="createQR()">Buat QRIS</button>
      
      <div id="qrResult" class="qr-container" style="display:none; margin-top:2rem">
         <div id="qrStatus" class="status info">⏳ Menunggu generate...</div>
         <div id="qrPlaceholder" style="margin-top:1rem"></div>
      </div>
    </div>
    
    <div class="card">
      <h2>🔍 Cek Status</h2>
      <div class="field"><label>Partner Reference No</label><input id="queryRef" placeholder="INV-xxx" /></div>
      <button class="btn btn-green" onclick="queryPayment()">Mengecek Status</button>
      <div id="queryResult" style="margin-top:1.5rem"></div>
    </div>
  </div>

  <div class="card">
    <h2>📡 Real-time Payment Events (SSE)</h2>
    <p style="font-size:0.875rem;color:#94a3b8;margin-bottom:1rem">Notifikasi pembayaran akan muncul di sini secara instan</p>
    <div id="events"><div style="color:#475569">-- Menunggu koneksi --</div></div>
  </div>
</div>

<script>
let sseSource = null;

function appendLog(msg, type = 'info') {
  const box = document.getElementById('events');
  const empty = box.querySelector('div[style*="color:#475569"]');
  if (empty) empty.remove();
  
  const time = new Date().toLocaleTimeString('id-ID');
  box.innerHTML += '<div class="log-entry"><span class="log-time">['+time+']</span> ' + msg + '</div>';
  box.scrollTop = box.scrollHeight;
}

function connectSSE(channel) {
  if (sseSource) sseSource.close();
  sseSource = new EventSource('/sse/payment?channel=' + channel);
  sseSource.onopen = () => appendLog('🔗 SSE Terhubung ke channel: ' + channel);
  sseSource.addEventListener('connected', e => appendLog('✅ ' + JSON.parse(e.data).message));
  sseSource.addEventListener('payment_update', e => {
    const d = JSON.parse(e.data);
    const statusColor = {
        'SUCCESS': '#10b981',
        'FAILED': '#f43f5e',
        'WAITING_PAYMENT': '#f59e0b',
        'INITIATED': '#38bdf8'
    }[d.status] || '#94a3b8';
    
    appendLog('💳 Payment Update: ' + d.partnerReferenceNo + ' &rarr; <strong style="color:' + statusColor + '">' + d.status + '</strong>');
    
    if (d.status === 'SUCCESS') {
        document.getElementById('qrStatus').className = 'status success';
        document.getElementById('qrStatus').innerHTML = '✅ Pembayaran Berhasil!';
    }
  });
  sseSource.onerror = () => appendLog('⚠️ SSE Putus/Error', 'error');
}

async function createQR() {
  const refNo = document.getElementById('refNo').value;
  const amount = parseFloat(document.getElementById('amount').value);
  const desc = document.getElementById('desc').value;
  
  const resultDiv = document.getElementById('qrResult');
  const statusDiv = document.getElementById('qrStatus');
  const placeholder = document.getElementById('qrPlaceholder');
  
  resultDiv.style.display = 'flex';
  statusDiv.className = 'status info';
  statusDiv.innerHTML = '⏳ Menghubungi DANA API...';
  placeholder.innerHTML = '';
  
  try {
    const res = await fetch('/api/qris/create', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            partnerReferenceNo: refNo,
            amount: amount,
            description: desc
        })
    });
    
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Gagal membuat QRIS');
    
    connectSSE(refNo);
    
    statusDiv.className = 'status info';
    statusDiv.innerHTML = '⏳ Scan QR di bawah untuk membayar';
    
    if (data.qrImageBase64) {
      placeholder.innerHTML = '<img class="qr-img" src="' + data.qrImageBase64 + '" alt="DANA QRIS" />';
    }
    
    appendLog('🆕 QRIS Dibuat: ' + refNo + ' | Rp ' + amount.toLocaleString('id-ID'));
    document.getElementById('queryRef').value = refNo;
    
  } catch(e) {
    statusDiv.className = 'status error';
    statusDiv.innerHTML = '❌ ' + e.message;
    appendLog('❌ Error: ' + e.message);
  }
}

async function queryPayment() {
  const refNo = document.getElementById('queryRef').value;
  const resultDiv = document.getElementById('queryResult');
  
  if (!refNo) return alert('Input Partner Ref No!');
  
  resultDiv.innerHTML = '<div class="status info">⏳ Mengecek status...</div>';
  
  try {
    const res = await fetch('/api/qris/status/' + refNo);
    const data = await res.json();
    
    if (!res.ok) throw new Error(data.error || 'Gagal query status');
    
    const isSuccess = data.transactionStatus === 'SUCCESS';
    resultDiv.innerHTML = '<div class="status ' + (isSuccess ? 'success' : 'info') + '">' + 
      'Status: <strong>' + data.transactionStatus + '</strong><br>' +
      'Ref DANA: ' + data.referenceNo + '<br>' +
      'Waktu: ' + (data.paidTime || '-') + '</div>';
    
    appendLog('🔍 Query Status: ' + refNo + ' &rarr; ' + data.transactionStatus);
  } catch(e) {
    resultDiv.innerHTML = '<div class="status error">❌ ' + e.message + '</div>';
  }
}
</script>
</body>
</html>
